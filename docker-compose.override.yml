# Dev-only override: source-mount + air hot-reload + open DB port.
services:
  app:
    image: cosmtrek/air:latest
    container_name: tourismania_app
    working_dir: /app
    entrypoint: ["air", "-c", ".air.toml"]
    user: "0:0"
    volumes:
      - ./:/app
      - go-build-cache:/root/.cache/go-build
      - go-mod-cache:/go/pkg/mod
    environment:
      GOFLAGS: "-buildvcs=false"
    ports:
      - "8080:8080"

volumes:
  go-build-cache: {}
  go-mod-cache: {}
