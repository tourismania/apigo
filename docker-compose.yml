services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tourismania-api:latest
    container_name: tourismania_app
    depends_on:
      database:
        condition: service_healthy
      kafka:
        condition: service_started
    env_file:
      - .env
    ports:
      - "8080:8080"
    restart: unless-stopped

  database:
    image: postgres:17-alpine
    container_name: tourismania_database
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-tourismania}
      POSTGRES_USER: ${DATABASE_USER:-root}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-qwerty123}
    volumes:
      - pgdata:/var/lib/postgres/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-root} -d ${DATABASE_NAME:-tourismania}"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    container_name: tourismania_kafka
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka:/bitnami/kafka

volumes:
  pgdata: {}
  kafka: {}
